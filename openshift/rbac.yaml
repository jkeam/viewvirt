---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: viewvirt-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: viewvirt
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"viewvirt-web"}}'

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: viewvirt-role-binding
subjects:
- kind: ServiceAccount
  name: viewvirt
roleRef:
  kind: Role
  name: viewvirt-role
  apiGroup: rbac.authorization.k8s.io

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: viewvirt-cluster-role
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["kubevirt.io"]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["kubevirt.io"]
  resources: ["virtualmachines", "virtualmachineinstances"]
  verbs: ["*"]
- apiGroups: ["cdi.kubevirt.io"]
  resources: ["*"]
  verbs: ["get", "list"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes"]
  verbs: ["get", "list"]

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: viewvirt-cluster-role-binding
subjects:
- kind: ServiceAccount
  name: viewvirt
roleRef:
  kind: ClusterRole
  name: viewvirt-cluster-role
  apiGroup: rbac.authorization.k8s.io

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: viewvirt-oauth-delegator
subjects:
- kind: ServiceAccount
  name: viewvirt
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: viewvirt-users
rules:
- apiGroups: ["viewvirt.keam.io"]
  resources: ["appaccess"]
  resourceNames: ["viewvirt"]
  verbs: ["use"]

---
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: viewvirt-users
users: []

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: viewvirt-users-binding
subjects:
- kind: Group
  name: viewvirt-users
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: viewvirt-users
  apiGroup: rbac.authorization.k8s.io
